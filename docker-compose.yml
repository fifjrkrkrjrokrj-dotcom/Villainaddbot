version: '3.8'

services:
  bot:
    build: .
    container_name: userbot_manager
    restart: always
    env_file:
      - .env
    volumes:
      - ./user_data:/app/user_data
      - ./logs:/app/logs
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: userbot_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
